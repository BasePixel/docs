<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="Inter Tight, system-ui, sans-serif">
  <rect width="880" height="460" fill="#FFFFFF"/>

  <text x="440" y="32" text-anchor="middle" font-size="14" font-weight="600" fill="#5B616E" letter-spacing="2">BATTLE LIFECYCLE — 5 PHASES</text>

  <!-- Phase 1: Mint / Edit -->
  <g transform="translate(40, 80)">
    <rect width="150" height="80" rx="6" fill="#FEE7E0" stroke="#FC401F" stroke-width="1.5"/>
    <text x="75" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#FC401F" letter-spacing="1">1 — COMMIT</text>
    <text x="75" y="42" text-anchor="middle" font-size="11" font-weight="600" fill="#5B616E">Player sets layout</text>
    <text x="75" y="58" text-anchor="middle" font-size="10" fill="#717886">on-chain: layoutHash</text>
    <text x="75" y="72" text-anchor="middle" font-size="10" fill="#717886">off-chain: layout+nonce</text>
  </g>

  <path d="M 195 120 L 230 120" stroke="#B1B7C3" stroke-width="2" marker-end="url(#a1)"/>

  <!-- Phase 2: Intent -->
  <g transform="translate(235, 80)">
    <rect width="150" height="80" rx="6" fill="#FEE7E0" stroke="#FC401F" stroke-width="1.5"/>
    <text x="75" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#FC401F" letter-spacing="1">2 — INTENT</text>
    <text x="75" y="42" text-anchor="middle" font-size="11" font-weight="600" fill="#5B616E">Attacker signs</text>
    <text x="75" y="58" text-anchor="middle" font-size="10" fill="#717886">EIP-712 attack intent</text>
    <text x="75" y="72" text-anchor="middle" font-size="10" fill="#717886">→ submitted to Engine</text>
  </g>

  <path d="M 390 120 L 425 120" stroke="#B1B7C3" stroke-width="2" marker-end="url(#a1)"/>

  <!-- Phase 3: Lock -->
  <g transform="translate(430, 80)">
    <rect width="150" height="80" rx="6" fill="#F5F5F4" stroke="#5B616E" stroke-width="1.5"/>
    <text x="75" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#5B616E" letter-spacing="1">3 — LOCK</text>
    <text x="75" y="42" text-anchor="middle" font-size="11" font-weight="600" fill="#5B616E">Engine calls</text>
    <text x="75" y="58" text-anchor="middle" font-size="10" fill="#717886">lockBattle() on-chain</text>
    <text x="75" y="72" text-anchor="middle" font-size="10" fill="#717886">both pixels: inBattle=true</text>
  </g>

  <path d="M 585 120 L 620 120" stroke="#B1B7C3" stroke-width="2" marker-end="url(#a1)"/>

  <!-- Phase 4: Reveal + Resolve -->
  <g transform="translate(625, 80)">
    <rect width="220" height="80" rx="6" fill="#E0EDFF" stroke="#0000FF" stroke-width="1.5"/>
    <text x="110" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#0000FF" letter-spacing="1">4 — REVEAL + SIMULATE</text>
    <text x="110" y="42" text-anchor="middle" font-size="11" font-weight="600" fill="#5B616E">Both layouts → Engine</text>
    <text x="110" y="58" text-anchor="middle" font-size="10" fill="#717886">verify hashes match</text>
    <text x="110" y="72" text-anchor="middle" font-size="10" fill="#717886">simulate fight, sign replay</text>
  </g>

  <!-- Vertical arrow down -->
  <path d="M 735 175 L 735 220" stroke="#B1B7C3" stroke-width="2" marker-end="url(#a1)"/>

  <!-- Phase 5: Settle -->
  <g transform="translate(625, 225)">
    <rect width="220" height="80" rx="6" fill="#E0EDFF" stroke="#0000FF" stroke-width="1.5"/>
    <text x="110" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#0000FF" letter-spacing="1">5 — SETTLE</text>
    <text x="110" y="42" text-anchor="middle" font-size="11" font-weight="600" fill="#5B616E">Engine submits result</text>
    <text x="110" y="58" text-anchor="middle" font-size="10" fill="#717886">resolveBattle(replayHash, winner)</text>
    <text x="110" y="72" text-anchor="middle" font-size="10" fill="#717886">NFT + ETH transfer atomically</text>
  </g>

  <!-- Loop back arrow -->
  <path d="M 625 265 Q 200 365 115 240 Q 80 175 115 165" stroke="#B1B7C3" stroke-width="1.5" stroke-dasharray="4 4" fill="none" marker-end="url(#a1)"/>
  <text x="350" y="345" font-size="10" fill="#717886" font-style="italic">winner returns to combat-ready state</text>

  <!-- Bottom: legend -->
  <g transform="translate(40, 390)">
    <rect width="800" height="50" rx="4" fill="#F5F5F4"/>
    <g transform="translate(20, 18)">
      <rect width="14" height="14" fill="#FEE7E0" stroke="#FC401F"/>
      <text x="22" y="11" font-size="10" fill="#5B616E" font-weight="600">Player action</text>
    </g>
    <g transform="translate(160, 18)">
      <rect width="14" height="14" fill="#F5F5F4" stroke="#5B616E"/>
      <text x="22" y="11" font-size="10" fill="#5B616E" font-weight="600">On-chain (Engine signs)</text>
    </g>
    <g transform="translate(360, 18)">
      <rect width="14" height="14" fill="#E0EDFF" stroke="#0000FF"/>
      <text x="22" y="11" font-size="10" fill="#5B616E" font-weight="600">Off-chain Battle Engine</text>
    </g>
    <text x="20" y="42" font-size="10" fill="#717886">Engine is a server-authoritative replay role; all inputs and the signed result are publicly verifiable.</text>
  </g>

  <defs>
    <marker id="a1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#B1B7C3"/>
    </marker>
  </defs>
</svg>
