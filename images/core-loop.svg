<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 480" width="680" height="480">
  <title>BasePixel core loop</title>
  <desc>The four-step game loop: mint a pixel, enable action mode, attack or defend, then redeem if lost within 24 hours.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Step 1: Mint -->
  <g>
    <rect x="240" y="30" width="200" height="60" rx="8" fill="#F5F5F4" stroke="#D6D3D1" stroke-width="0.5"/>
    <text x="340" y="54" text-anchor="middle" dominant-baseline="central" font-family="Inter Tight, system-ui, sans-serif" font-size="14" font-weight="500" fill="#1C1917">1 · Mint a pixel</text>
    <text x="340" y="74" text-anchor="middle" dominant-baseline="central" font-family="Inter Tight, system-ui, sans-serif" font-size="12" fill="#78716C">Pick Red or Blue · 0.001 ETH</text>
  </g>

  <!-- Arrow 1 -> 2 -->
  <line x1="340" y1="92" x2="340" y2="118" stroke="#A8A29E" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Enable Action -->
  <g>
    <rect x="240" y="125" width="200" height="60" rx="8" fill="#F5F5F4" stroke="#D6D3D1" stroke-width="0.5"/>
    <text x="340" y="149" text-anchor="middle" dominant-baseline="central" font-family="Inter Tight, system-ui, sans-serif" font-size="14" font-weight="500" fill="#1C1917">2 · Enable action</text>
    <text x="340" y="169" text-anchor="middle" dominant-baseline="central" font-family="Inter Tight, system-ui, sans-serif" font-size="12" fill="#78716C">Join the war · or stay neutral</text>
  </g>

  <!-- Branching arrows from step 2 -->
  <line x1="340" y1="187" x2="340" y2="215" stroke="#A8A29E" stroke-width="1.5"/>
  <line x1="170" y1="215" x2="510" y2="215" stroke="#A8A29E" stroke-width="1.5"/>
  <line x1="170" y1="215" x2="170" y2="248" stroke="#FC401F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="510" y1="215" x2="510" y2="248" stroke="#0000FF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3a: Attack (Red) -->
  <g>
    <rect x="70" y="255" width="200" height="60" rx="8" fill="#FEE7E0" stroke="#FC401F" stroke-width="0.5"/>
    <text x="170" y="279" text-anchor="middle" dominant-baseline="central" font-family="Inter Tight, system-ui, sans-serif" font-size="14" font-weight="500" fill="#9A2A0F">3a · Attack</text>
    <text x="170" y="299" text-anchor="middle" dominant-baseline="central" font-family="Inter Tight, system-ui, sans-serif" font-size="12" fill="#C8350F">Conquer enemy pixels</text>
  </g>

  <!-- Step 3b: Defend (Blue) -->
  <g>
    <rect x="410" y="255" width="200" height="60" rx="8" fill="#E0EDFF" stroke="#0000FF" stroke-width="0.5"/>
    <text x="510" y="279" text-anchor="middle" dominant-baseline="central" font-family="Inter Tight, system-ui, sans-serif" font-size="14" font-weight="500" fill="#0033A8">3b · Defend</text>
    <text x="510" y="299" text-anchor="middle" dominant-baseline="central" font-family="Inter Tight, system-ui, sans-serif" font-size="12" fill="#1851D6">Hold your territory</text>
  </g>

  <!-- Merge arrows from 3a/3b -> step 4 -->
  <line x1="170" y1="315" x2="170" y2="350" stroke="#A8A29E" stroke-width="1.5"/>
  <line x1="510" y1="315" x2="510" y2="350" stroke="#A8A29E" stroke-width="1.5"/>
  <line x1="170" y1="350" x2="510" y2="350" stroke="#A8A29E" stroke-width="1.5"/>
  <line x1="340" y1="350" x2="340" y2="378" stroke="#A8A29E" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: Redeem -->
  <g>
    <rect x="240" y="385" width="200" height="60" rx="8" fill="#F5F5F4" stroke="#D6D3D1" stroke-width="0.5"/>
    <text x="340" y="409" text-anchor="middle" dominant-baseline="central" font-family="Inter Tight, system-ui, sans-serif" font-size="14" font-weight="500" fill="#1C1917">4 · Redeem within 24h</text>
    <text x="340" y="429" text-anchor="middle" dominant-baseline="central" font-family="Inter Tight, system-ui, sans-serif" font-size="12" fill="#78716C">Lost a pixel? Reclaim it</text>
  </g>
</svg>
